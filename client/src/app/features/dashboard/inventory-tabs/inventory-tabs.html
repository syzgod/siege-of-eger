<section class="medieval-card" aria-label="Fortress inventory">
  <p-tabs [value]="0">
    <p-tablist>
      <p-tab [value]="0">🪙 Resources</p-tab>
      <p-tab [value]="1">🗡️ Armory</p-tab>
      <p-tab [value]="2">⚔️ Troops</p-tab>
      <p-tab [value]="3">👨‍🌾 Population</p-tab>
      <p-tab [value]="4">📦 Consumption</p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel [value]="0">
        <div class="pt-4">
          <app-resource-panel />
        </div>
      </p-tabpanel>

      <p-tabpanel [value]="1">
        <div class="pt-4">
          <app-armory-panel />
        </div>
      </p-tabpanel>

      <p-tabpanel [value]="2">
        <div class="pt-4">
          <app-troops-panel />
        </div>
      </p-tabpanel>

      <p-tabpanel [value]="3">
        <div class="pt-4">
          <app-population-panel />
        </div>
      </p-tabpanel>

      <p-tabpanel [value]="4">
        <div class="pt-4">
          <app-consumption-panel />
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</section>
